<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Semaforo Adaptativo — Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #fff; font-family: monospace; display: flex; gap: 16px; padding: 16px; }
    #video-wrap { position: relative; flex: 1; }
    canvas { width: 100%; border-radius: 8px; display: block; }
    #panel {
      width: 260px; display: flex; flex-direction: column; gap: 12px;
    }
    .card {
      background: #1a1a1a; border-radius: 8px; padding: 14px;
      border: 1px solid #2a2a2a;
    }
    .card h3 { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
    .metric { font-size: 28px; font-weight: bold; }
    .fase {
      font-size: 14px; font-weight: bold; padding: 10px;
      border-radius: 6px; text-align: center;
    }
    .VERDE_VEHICULAR, .Verde.vehicular { background: #0a3d1f; color: #4ade80; }
    .AMARILLO, .Amarillo              { background: #3d2e0a; color: #fbbf24; }
    .VERDE_PEATONAL, .Verde.peatonal  { background: #0a3d1f; color: #34d399; }
    .TODO_ROJO, .Todo.rojo            { background: #3d0a0a; color: #f87171; }
    .semaforo {
      display: flex; justify-content: center; gap: 12px; margin-top: 8px;
    }
    .luz {
      width: 40px; height: 40px; border-radius: 50%;
      background: #222; border: 2px solid #333; transition: background 0.3s;
    }
    .luz.on-red    { background: #ef4444; box-shadow: 0 0 12px #ef4444; }
    .luz.on-yellow { background: #f59e0b; box-shadow: 0 0 12px #f59e0b; }
    .luz.on-green  { background: #22c55e; box-shadow: 0 0 12px #22c55e; }
    #status { font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <div id="video-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="panel">
    <div class="card">
      <h3>Estado del semaforo</h3>
      <div id="fase-label" class="fase">Conectando...</div>
      <div class="semaforo">
        <div class="luz" id="luz-red"></div>
        <div class="luz" id="luz-yellow"></div>
        <div class="luz" id="luz-green"></div>
      </div>
    </div>

    <div class="card">
      <h3>Tiempo restante</h3>
      <div class="metric" id="tiempo">--</div>
      <div style="font-size:12px;color:#555;margin-top:4px">segundos</div>
    </div>

    <div class="card">
      <h3>Zona vehicular</h3>
      <div class="metric" style="color:#63c8ff" id="n-veh">0</div>
      <div style="font-size:12px;color:#555;margin-top:4px">vehiculos detectados</div>
    </div>

    <div class="card">
      <h3>Zona peatonal</h3>
      <div class="metric" style="color:#ff6363" id="n-peat">0</div>
      <div style="font-size:12px;color:#555;margin-top:4px">personas detectadas</div>
    </div>

    <div class="card">
      <h3>Tiempos calculados</h3>
      <div style="font-size:13px;color:#aaa;line-height:1.8">
        Verde vehiculos: <span id="t-veh" style="color:#63c8ff">--</span>s<br>
        Verde peatones:  <span id="t-peat" style="color:#ff6363">--</span>s
      </div>
    </div>

    <div class="card">
      <h3>Conexion</h3>
      <div id="status">Desconectado</div>
    </div>
  </div>

<script>
  const canvas  = document.getElementById("canvas");
  const ctx     = canvas.getContext("2d");
  const SERVER  = `ws://${location.hostname}:8000/ws`;
  let ws;

  function actualizarLuces(fase) {
    document.getElementById("luz-red").className    = "luz";
    document.getElementById("luz-yellow").className = "luz";
    document.getElementById("luz-green").className  = "luz";
    if (fase.includes("Verde"))    document.getElementById("luz-green").className  = "luz on-green";
    if (fase.includes("Amarillo")) document.getElementById("luz-yellow").className = "luz on-yellow";
    if (fase.includes("rojo"))     document.getElementById("luz-red").className    = "luz on-red";
  }

  function conectar() {
    ws = new WebSocket(SERVER);
    document.getElementById("status").textContent = "Conectando...";

    ws.onopen = () => {
      document.getElementById("status").textContent = "Conectado ✓";
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      // Dibujar frame
      const img = new Image();
      img.onload = () => {
        canvas.width  = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
      };
      img.src = "data:image/jpeg;base64," + data.frame;

      // Actualizar panel
      const faseEl = document.getElementById("fase-label");
      faseEl.textContent = data.fase;
      faseEl.className   = "fase " + data.fase.replace(/ /g, ".");

      document.getElementById("tiempo").textContent  = data.tiempo_restante;
      document.getElementById("n-veh").textContent   = data.n_veh;
      document.getElementById("n-peat").textContent  = data.n_peat;
      document.getElementById("t-veh").textContent   = data.t_veh_calc;
      document.getElementById("t-peat").textContent  = data.t_peat_calc;

      actualizarLuces(data.fase);
    };

    ws.onclose = () => {
      document.getElementById("status").textContent = "Desconectado — reconectando...";
      setTimeout(conectar, 2000);
    };

    ws.onerror = () => ws.close();
  }

  conectar();
</script>
</body>
</html>
