<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Semaforo Adaptativo — Monitor</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles/style.css') }}"
    />
  </head>
  <body>
    <div id="video-wrap">
      <canvas id="canvas"></canvas>
    </div>

    <div id="panel">
      <div class="card">
        <h3>Estado del semaforo</h3>
        <div id="fase-label" class="fase">Conectando...</div>
        <div class="semaforo">
          <div
            class="luz function conectar() { function conectar() {"
            id="luz-red"
          ></div>
          <div class="luz" id="luz-yellow"></div>
          <div class="luz" id="luz-green"></div>
        </div>
      </div>

      <div class="card">
        <h3>Tiempo restante</h3>
        <div class="metric" id="tiempo">--</div>
        <div style="font-size: 12px; color: #555; margin-top: 4px">
          segundos
        </div>
      </div>

      <div class="card">
        <h3>Zona vehicular</h3>
        <div class="metric" style="color: #63c8ff" id="n-veh">0</div>
        <div style="font-size: 12px; color: #555; margin-top: 4px">
          vehiculos detectados
        </div>
      </div>

      <div class="card">
        <h3>Zona peatonal</h3>
        <div class="metric" style="color: #ff6363" id="n-peat">0</div>
        <div style="font-size: 12px; color: #555; margin-top: 4px">
          personas detectadas
        </div>
      </div>

      <div class="card">
        <h3>Tiempos calculados</h3>
        <div style="font-size: 13px; color: #aaa; line-height: 1.8">
          Verde vehiculos:
          <span id="t-veh" style="color: #63c8ff">--</span>s<br />
          Verde peatones: <span id="t-peat" style="color: #ff6363">--</span>s
        </div>
      </div>

      <div class="card">
        <h3>Conexion</h3>
        <div id="status">Desconectado</div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script type="text/javascript" charset="utf-8">
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      var SOCKET_URL = "{{ backend_url }}";

      function actualizarLuces(fase) {
        document.getElementById("luz-red").className = "luz";
        document.getElementById("luz-yellow").className = "luz";
        document.getElementById("luz-green").className = "luz";
        if (fase.includes("Verde"))
          document.getElementById("luz-green").className = "luz on-green";
        if (fase.includes("Amarillo"))
          document.getElementById("luz-yellow").className = "luz on-yellow";
        if (fase.includes("rojo"))
          document.getElementById("luz-red").className = "luz on-red";
      }

      function conectar() {
        const statusEl = document.getElementById("status");
        const normalizedUrl =
          SOCKET_URL.startsWith("http://") || SOCKET_URL.startsWith("https://")
            ? SOCKET_URL
            : `${window.location.protocol}//${SOCKET_URL}`;
        const socket = io(normalizedUrl, {
          transports: ["polling"],
          upgrade: false,
        });
        statusEl.textContent = "Conectando...";

        socket.on("connect", function () {
          statusEl.textContent = "Conectado ✓";
        });

        socket.on("connect_error", function (err) {
          statusEl.textContent = "Error de conexion — reintentando...";
          console.error("Socket error:", err);
        });

        socket.on("video_frame", function (msg) {
          console.log(msg);

          // Dibujar frame
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
          };
          img.src = "data:image/jpeg;base64," + msg.frame;

          // Actualizar panel
          const faseEl = document.getElementById("fase-label");
          const fase = msg.fase || "";
          faseEl.textContent = fase || "--";
          faseEl.className = fase ? "fase " + fase.replace(/ /g, ".") : "fase";

          document.getElementById("tiempo").textContent = msg.tiempo_restante;
          document.getElementById("n-veh").textContent = msg.n_veh;
          document.getElementById("n-peat").textContent = msg.n_peat;
          document.getElementById("t-veh").textContent = msg.t_veh_calc;
          document.getElementById("t-peat").textContent = msg.t_peat_calc;

          actualizarLuces(msg.fase);
        });

        socket.on("disconnect", function () {
          statusEl.textContent = "Desconectado — reconectando...";
          setTimeout(conectar, 2000);
        });
      }
      conectar();
    </script>
  </body>
</html>
